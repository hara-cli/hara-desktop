name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hara-desktop-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".node-version"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --registry https://registry.npmjs.org/

      - name: Validate release metadata
        run: npm run check:release

      - name: Run regression tests
        run: npm test

      - name: Build the production renderer
        run: npm run build

  native:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.97.0"

      - name: Prepare the test-only sidecar fixture
        run: cp /usr/bin/true src-tauri/binaries/hara-aarch64-apple-darwin

      - name: Run native host regressions
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --locked
