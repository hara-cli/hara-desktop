# Multi-platform desktop builds — macOS (arm64 + x64), Windows x64, Linux x64.
# Trigger: push a v* tag (published GitHub Release gets the installers) or run manually.
# Updater artifacts are signed when TAURI_SIGNING_PRIVATE_KEY is configured. macOS app signing and
# notarization are completed by the guarded local merge flow in scripts/release-mac-assets.sh.
name: build
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # tauri-action uploads assets to the release for the tag

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            # AppImage's linuxdeploy chokes on this project (66MB sidecar suspected) — ship deb+rpm
            extraArgs: "--bundles deb,rpm"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Validate desktop, tag, and sidecar metadata
        run: node scripts/check-release-metadata.mjs
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2
      - run: npm ci
      - run: npm audit --omit=dev --registry https://registry.npmjs.org/
      - name: Build hara sidecar (bun single-file, cross-compiled per target)
        uses: oven-sh/setup-bun@v2
      - shell: bash
        run: |
          CLI_VERSION="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/src-tauri/binaries/SIDECAR_VERSION")"
          [[ "$CLI_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid SIDECAR_VERSION: $CLI_VERSION" >&2
            exit 1
          }
          git clone --depth 1 --branch "v${CLI_VERSION}" https://github.com/hara-cli/hara /tmp/hara-cli
          cd /tmp/hara-cli && npm ci && npx tsc
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)      BT=bun-darwin-arm64 ;;
            x86_64-apple-darwin)       BT=bun-darwin-x64 ;;
            x86_64-pc-windows-msvc)    BT=bun-windows-x64 ;;
            x86_64-unknown-linux-gnu)  BT=bun-linux-x64 ;;
          esac
          bun scripts/build-binary.ts dist/bin/hara-sidecar "$BT"
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/binaries"
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          HOST_TARGET="$(rustc -vV | awk '/^host:/{print $2}')"
          if [[ "${{ matrix.target }}" == "$HOST_TARGET" ]]; then
            BUILT_VERSION="$("dist/bin/hara-sidecar${EXT}" --version)"
            [[ "$BUILT_VERSION" == "$CLI_VERSION" ]] || {
              echo "sidecar version mismatch: expected $CLI_VERSION, built $BUILT_VERSION" >&2
              exit 1
            }
          else
            echo "cross-target sidecar ${{ matrix.target }} built from v${CLI_VERSION}; execution smoke deferred to its native runner"
          fi
          cp dist/bin/hara-sidecar$EXT "$GITHUB_WORKSPACE/src-tauri/binaries/hara-${{ matrix.target }}$EXT"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # updater signing — add the TAURI_SIGNING_PRIVATE_KEY repo secret (contents of
          # ~/.tauri/hara-desktop.key on the machine that ran `tauri signer generate`).
          # Without it, builds still succeed but updater artifacts (latest.json) are unsigned/absent.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          NO_STRIP: "true" # linuxdeploy strip breaks the AppImage bundling step on ubuntu-22.04
        with:
          args: --target ${{ matrix.target }} ${{ matrix.extraArgs || '' }}
          tagName: ${{ github.ref_name }}
          releaseName: "Hara Desktop ${{ github.ref_name }}"
          releaseDraft: false # upload straight onto the (already published) release for this tag
          prerelease: false
      - name: package smoke (bundle structure + sidecar runs)
        shell: bash
        env:
          TAURI_TARGET: ${{ matrix.target }}
        run: node scripts/package-smoke.mjs
